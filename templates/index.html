<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MATH PONG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --cyan:   #00eeff;
  --red:    #ff4466;
  --gold:   #ffcc00;
  --bg:     #000408;
  --glass:  rgba(0,0,0,0.75);
}

html, body {
  width:100%; height:100%;
  background: var(--bg);
  color:#fff;
  font-family: 'Orbitron', sans-serif;
  overflow: hidden;
  touch-action: none;
}

canvas#c { display:block; position:fixed; top:0; left:0; width:100%; height:100%; }

/* ── SCANLINES ── */
#scanlines {
  position:fixed; inset:0; pointer-events:none; z-index:998;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 3px,
    rgba(0,0,0,0.09) 3px, rgba(0,0,0,0.09) 4px
  );
}

/* ── VIGNETTE ── */
#vignette {
  position:fixed; inset:0; pointer-events:none; z-index:997;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.75) 100%);
}

/* ── SCREENS ── */
.screen {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:16px;
  z-index:100;
}
.screen.hidden { display:none !important; }

/* ── MENU ── */
#screen-menu {
  background: radial-gradient(ellipse at 30% 40%, rgba(0,238,255,0.05) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 60%, rgba(255,68,102,0.05) 0%, transparent 60%),
              var(--bg);
}
#screen-menu::before {
  content:'';
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(0,238,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,238,255,0.035) 1px, transparent 1px);
  background-size: 48px 48px;
  animation: gridMove 24s linear infinite;
  pointer-events:none;
}
@keyframes gridMove {
  0%   { background-position: 0 0; }
  100% { background-position: 48px 48px; }
}

.menu-logo {
  font-size: clamp(52px, 13vw, 96px);
  font-weight:900;
  background: linear-gradient(135deg, var(--cyan) 0%, #fff 45%, var(--red) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing:8px;
  animation: logoPulse 3s ease-in-out infinite;
  text-align:center;
  line-height:1;
  position:relative; z-index:1;
}
@keyframes logoPulse {
  0%,100% { filter: drop-shadow(0 0 20px rgba(0,238,255,0.4)); }
  50%      { filter: drop-shadow(0 0 50px rgba(0,238,255,0.7)) drop-shadow(0 0 100px rgba(255,68,102,0.25)); }
}
.menu-badge {
  font-family:'Share Tech Mono', monospace;
  font-size:clamp(9px, 2vw, 11px);
  letter-spacing:5px;
  color: var(--gold);
  background: rgba(255,204,0,0.07);
  border: 1px solid rgba(255,204,0,0.2);
  border-radius:3px;
  padding: 5px 14px;
  text-shadow: 0 0 14px var(--gold);
  position:relative; z-index:1;
}
.menu-sub {
  font-family:'Share Tech Mono', monospace;
  font-size:clamp(9px, 2.2vw, 11px);
  letter-spacing:5px; color:#2e2e2e;
  margin-bottom:20px;
  text-align:center;
  position:relative; z-index:1;
}

.input-group {
  display:flex; flex-direction:column; gap:10px;
  width: min(300px, 85vw);
  position:relative; z-index:1;
}
.input-group input {
  font-family:'Orbitron', sans-serif;
  font-size:13px; letter-spacing:2px;
  padding:15px 18px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius:6px;
  color:#fff;
  outline:none;
  transition: border-color .25s, box-shadow .25s, background .25s;
}
.input-group input:focus {
  border-color: var(--cyan);
  background: rgba(0,238,255,0.04);
  box-shadow: 0 0 0 3px rgba(0,238,255,0.08), 0 0 20px rgba(0,238,255,0.1);
}
.input-group input::placeholder { color:#222; }

.btn-primary {
  font-family:'Orbitron', sans-serif;
  font-size:13px; font-weight:700; letter-spacing:4px;
  padding:17px 48px;
  background: rgba(0,238,255,0.07);
  border: 1px solid var(--cyan);
  color: var(--cyan);
  cursor:pointer;
  transition: all .25s;
  border-radius:6px;
  margin-top:6px;
  text-shadow: 0 0 16px var(--cyan);
  position:relative; z-index:1;
}
.btn-primary:hover, .btn-primary:active {
  background: rgba(0,238,255,0.15);
  box-shadow: 0 0 40px rgba(0,238,255,0.35), 0 0 80px rgba(0,238,255,0.1);
  transform: translateY(-2px);
}

/* ── WAITING ── */
#screen-waiting {
  background: radial-gradient(ellipse at center, rgba(0,238,255,0.04) 0%, var(--bg) 70%);
  gap:20px;
}
.waiting-ring {
  width:56px; height:56px;
  border-radius:50%;
  border: 2px solid rgba(0,238,255,0.12);
  border-top-color: var(--cyan);
  animation: spin 1s linear infinite;
  box-shadow: 0 0 20px rgba(0,238,255,0.2);
}
@keyframes spin { to { transform: rotate(360deg); } }
.waiting-dots span {
  display:inline-block;
  width:6px; height:6px;
  border-radius:50%;
  background: var(--cyan);
  margin:0 4px;
  animation: blink 1.2s ease-in-out infinite;
  box-shadow: 0 0 8px var(--cyan);
}
.waiting-dots span:nth-child(2) { animation-delay:.2s; }
.waiting-dots span:nth-child(3) { animation-delay:.4s; }
@keyframes blink { 0%,100%{opacity:.15} 50%{opacity:1} }

/* ── HUD ── */
#hud {
  position:fixed; top:0; left:0; width:100%; z-index:50;
  pointer-events:none;
}
#scores {
  display:flex; align-items:center; justify-content:center;
  gap:32px;
  padding:10px 32px;
  background: rgba(0,0,0,0.88);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
#game-timer {
  font-family:'Share Tech Mono', monospace;
  font-size:clamp(20px,6vw,28px);
  font-weight:700;
  color: var(--gold);
  text-shadow: 0 0 16px rgba(255,204,0,0.7);
  letter-spacing:3px;
  min-width:70px;
  text-align:center;
}
#game-timer.urgent {
  color: var(--red);
  text-shadow: 0 0 20px var(--red);
  animation: timerUrgent .5s ease-in-out infinite;
}
@keyframes timerUrgent { 0%,100%{opacity:1} 50%{opacity:0.55} }
.score-block { text-align:center; min-width:50px; }
.score-label { font-size:8px; color:#333; letter-spacing:3px; margin-bottom:2px; }
.score-val   { font-size:clamp(28px, 8vw, 40px); font-weight:900; line-height:1; }
#s0 .score-val { color:var(--cyan); text-shadow:0 0 24px rgba(0,238,255,0.8); }
#s1 .score-val { color:var(--red);  text-shadow:0 0 24px rgba(255,68,102,0.8); }
.score-sep   { font-size:18px; color:#1a1a1a; }

#opponent-label {
  position:fixed; top:68px; left:50%; transform:translateX(-50%);
  font-family:'Share Tech Mono', monospace;
  font-size:10px; color:#333; letter-spacing:3px;
  pointer-events:none; z-index:50;
  white-space:nowrap;
  background: rgba(0,0,0,0.5);
  padding: 3px 12px; border-radius:20px;
}

/* ── MOBILE CONTROLS ── */
#mobile-controls {
  position:fixed; bottom:0; left:0; width:100%;
  display:flex; justify-content:center; gap:20px;
  padding:14px 24px 32px;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
  z-index:60;
}
.ctrl-btn {
  font-family:'Orbitron', sans-serif;
  font-size:20px; font-weight:900;
  width:76px; height:76px;
  border-radius:16px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.4);
  cursor:pointer;
  user-select:none;
  transition: all .12s;
  display:flex; align-items:center; justify-content:center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
}
.ctrl-btn:active, .ctrl-btn.pressed {
  background: rgba(0,238,255,0.14);
  border-color: rgba(0,238,255,0.45);
  color: var(--cyan);
  box-shadow: 0 0 24px rgba(0,238,255,0.25), inset 0 0 12px rgba(0,238,255,0.08);
  transform: scale(0.94);
}

/* ── MATH OVERLAY ── */
#math-overlay {
  position:fixed; inset:0; z-index:200;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:0;
  background: rgba(0,2,8,0.94);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  opacity:0; pointer-events:none;
  transition: opacity .3s;
}
#math-overlay.show { opacity:1; pointer-events:all; }
#math-overlay::before {
  content:'';
  position:absolute; inset:0;
  background: radial-gradient(ellipse at center, rgba(255,204,0,0.04) 0%, transparent 70%);
  pointer-events:none;
}

#math-title {
  font-size:10px; letter-spacing:7px; color:var(--gold);
  text-shadow:0 0 18px rgba(255,204,0,0.8);
  margin-bottom:14px;
  border: 1px solid rgba(255,204,0,0.2);
  padding: 5px 16px; border-radius:3px;
  background: rgba(255,204,0,0.05);
}
#math-who   {
  font-size:12px; letter-spacing:3px; margin-bottom:22px;
}
#math-q     {
  font-size:clamp(38px, 11vw, 60px);
  font-weight:900;
  text-shadow:0 0 40px rgba(255,255,255,0.4), 0 0 80px rgba(0,238,255,0.2);
  margin-bottom:28px; letter-spacing:3px;
  position:relative; z-index:1;
}
#math-btns  { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; position:relative; z-index:1; }
.math-btn {
  font-family:'Orbitron', sans-serif;
  font-size:clamp(15px, 4.5vw, 20px); font-weight:700;
  padding:14px clamp(18px, 5.5vw, 32px);
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.8);
  cursor:pointer;
  border-radius:8px;
  transition: all .15s;
  outline:none;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.math-btn:hover,.math-btn:active {
  background:rgba(255,204,0,0.1);
  border-color:rgba(255,204,0,0.6);
  color:var(--gold);
  transform:translateY(-2px);
  box-shadow: 0 6px 24px rgba(255,204,0,0.2);
}
.math-btn.correct {
  border-color:rgba(0,255,128,0.7);
  color:#00ff80;
  background:rgba(0,255,128,.1);
  box-shadow: 0 0 20px rgba(0,255,128,0.2);
}
.math-btn.wrong   {
  border-color:rgba(255,68,102,0.5);
  color:rgba(255,68,102,0.7);
  background:rgba(255,68,102,0.05);
}

#math-timer-wrap {
  width:min(280px,72vw); height:3px;
  background:rgba(255,255,255,0.06);
  margin-top:22px; border-radius:2px; overflow:hidden;
  position:relative; z-index:1;
}
#math-timer-bar  {
  height:100%; width:100%;
  background:linear-gradient(90deg,var(--cyan),var(--gold));
  transition:width .1s linear;
  box-shadow: 0 0 8px rgba(255,204,0,0.5);
}
#math-fb {
  margin-top:16px; font-size:13px; letter-spacing:3px;
  min-height:20px; font-family:'Share Tech Mono',monospace;
  position:relative; z-index:1;
}

/* ── WIN / PODIUM ── */
#screen-win {
  background: radial-gradient(ellipse at center top, rgba(255,204,0,0.06) 0%, rgba(0,0,0,0.98) 60%);
  z-index:300;
}
#win-title  {
  font-size:10px; letter-spacing:7px; color:var(--gold);
  background: rgba(255,204,0,0.07);
  border: 1px solid rgba(255,204,0,0.2);
  padding: 5px 16px; border-radius:3px;
}
#win-name   {
  font-size:clamp(38px,11vw,68px); font-weight:900; letter-spacing:5px; margin:8px 0;
  animation: winPulse 2s ease-in-out infinite;
}
#win-name.p0 { color:var(--cyan); text-shadow:0 0 60px rgba(0,238,255,0.8), 0 0 120px rgba(0,238,255,0.3); }
#win-name.p1 { color:var(--red);  text-shadow:0 0 60px rgba(255,68,102,0.8), 0 0 120px rgba(255,68,102,0.3); }
@keyframes winPulse { 0%,100%{opacity:1} 50%{opacity:0.8} }
#win-turma  { font-size:11px; color:#444; letter-spacing:4px; font-family:'Share Tech Mono',monospace; }

/* Pódio */
#podium { display:flex; align-items:flex-end; gap:6px; margin:24px 0 8px; }
.podium-col { display:flex; flex-direction:column; align-items:center; gap:4px; }
.podium-rank { font-size:10px; color:#555; letter-spacing:2px; }
.podium-bar {
  width:clamp(60px,18vw,84px);
  border-radius:4px 4px 0 0;
  display:flex; flex-direction:column-reverse; align-items:center; justify-content:flex-start;
  padding-bottom:8px; padding-top:6px;
}
.podium-bar.rank1 { height:110px; background:linear-gradient(to top, #b8860033, #ffcc0044); border:1px solid var(--gold); }
.podium-bar.rank2 { height:80px;  background:linear-gradient(to top, #44444422, #88888833); border:1px solid #555; }
.podium-bar.rank3 { height:60px;  background:linear-gradient(to top, #5c3a1e33, #cd7f3244); border:1px solid #cd7f32; }
.podium-name  { font-size:clamp(8px,2.2vw,10px); letter-spacing:1px; text-align:center; line-height:1.3; }
.podium-wins  { font-size:clamp(14px,4vw,20px); font-weight:900; }
.podium-bar.rank1 .podium-wins { color:var(--gold); }
.podium-bar.rank2 .podium-wins { color:#aaa; }
.podium-bar.rank3 .podium-wins { color:#cd7f32; }
.podium-crown { font-size:18px; }

#leaderboard-rest { font-family:'Share Tech Mono',monospace; font-size:11px; color:#444; letter-spacing:2px; line-height:2; text-align:center; }

.btn-secondary {
  font-family:'Orbitron', sans-serif;
  font-size:13px; font-weight:700; letter-spacing:3px;
  padding:14px 44px; margin-top:12px;
  background:transparent;
  border: 2px solid var(--gold);
  color:var(--gold);
  cursor:pointer;
  transition: all .2s;
  border-radius:3px;
}
.btn-secondary:hover,.btn-secondary:active { background:rgba(255,204,0,.1); box-shadow:0 0 24px rgba(255,204,0,.4); }

/* ── OPPONENT LEFT ── */
#screen-disconnected { background:rgba(0,0,0,.92); z-index:400; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>

<!-- ══ MENU ══════════════════════════════════════════════════════════════════ -->
<div id="screen-menu" class="screen">
  <div class="menu-logo">MATH<br>PONG</div>
  <div class="menu-badge">⚡ DESAFIO MATEMÁTICO ⚡</div>
  <div class="menu-sub">MULTIPLAYER · MATEMÁTICA · TEMPO REAL</div>
  <div class="input-group">
    <input id="inp-name"  type="text" placeholder="SEU NOME" maxlength="30" autocomplete="off" spellcheck="false">
    <input id="inp-turma" type="text" placeholder="SUA TURMA (ex: 9A)" maxlength="20" autocomplete="off" spellcheck="false">
    <button class="btn-primary" onclick="joinQueue()"><span>JOGAR AGORA</span></button>
  </div>
</div>

<!-- ══ WAITING ════════════════════════════════════════════════════════════════ -->
<div id="screen-waiting" class="screen hidden">
  <div class="waiting-ring"></div>
  <div style="font-size:11px;letter-spacing:4px;color:#333;margin-top:4px">PROCURANDO OPONENTE</div>
  <div class="waiting-dots"><span></span><span></span><span></span></div>
  <button class="btn-secondary" onclick="cancelQueue()" style="margin-top:16px;border-color:rgba(255,255,255,0.08);color:#333">CANCELAR</button>
</div>

<!-- ══ HUD (visível durante o jogo) ══════════════════════════════════════════ -->
<div id="hud" class="hidden">
  <div id="scores">
    <div class="score-block" id="s0">
      <div class="score-label" id="label0">P1</div>
      <div class="score-val">0</div>
    </div>
    <div id="game-timer">3:00</div>
    <div class="score-sep">:</div>
    <div class="score-block" id="s1">
      <div class="score-label" id="label1">P2</div>
      <div class="score-val">0</div>
    </div>
  </div>
</div>
<div id="opponent-label" class="hidden"></div>

<!-- ══ CONTROLES MOBILE ═══════════════════════════════════════════════════════ -->
<div id="mobile-controls" class="hidden">
  <button class="ctrl-btn" id="btn-up">▲</button>
  <button class="ctrl-btn" id="btn-down">▼</button>
</div>

<!-- ══ MATH OVERLAY ════════════════════════════════════════════════════════════ -->
<div id="math-overlay">
  <div id="math-title">⚡ DESAFIO MATEMÁTICO ⚡</div>
  <div id="math-who"></div>
  <div id="math-q"></div>
  <div id="math-btns"></div>
  <div id="math-timer-wrap"><div id="math-timer-bar"></div></div>
  <div id="math-fb"></div>
</div>

<!-- ══ WIN / PÓDIO ════════════════════════════════════════════════════════════ -->
<div id="screen-win" class="screen hidden">
  <div id="win-title">VENCEDOR</div>
  <div id="win-name"></div>
  <div id="win-turma"></div>
  <div id="podium"></div>
  <div id="leaderboard-rest"></div>
  <button class="btn-secondary" onclick="goMenu()">JOGAR DE NOVO</button>
</div>

<!-- ══ DESCONECTADO ═══════════════════════════════════════════════════════════ -->
<div id="screen-disconnected" class="screen hidden">
  <div style="font-size:14px;letter-spacing:4px;color:#555">OPONENTE DESCONECTOU</div>
  <button class="btn-secondary" onclick="goMenu()" style="margin-top:16px;">VOLTAR AO MENU</button>
</div>

<script>
// ══ CANVAS ═══════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, cx, cy;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
}
resize();
window.addEventListener('resize', resize);

// ══ GAME STATE ════════════════════════════════════════════════════════════════
const PADDLE_H = 0.22;
const PADDLE_W = 0.04;
const BALL_R   = 0.025;

let myIdx    = -1;
let roomId   = null;
let myName   = '';
let myPaddleY = 0;
let oppPaddleY = 0;
let ballState  = { x:0, y:0, vx:0, vy:0 };
let scores     = [0, 0];
let particles  = [];
let animFrame  = null;
let armSwing   = 0;

// ══ DRAW SCENE (CLASSIC PONG 2D) ══════════════════════════════════════════════
function drawBackground() {
  // Deep space background
  ctx.fillStyle = '#000306';
  ctx.fillRect(0, 0, W, H);
  // Subtle center glow
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W, H) * 0.7);
  grad.addColorStop(0, 'rgba(0,15,30,0.3)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawCenterLine() {
  const dashH = H * 0.04;
  const gap   = H * 0.022;
  const x     = cx;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  for (let y = 0; y < H; y += dashH + gap) {
    ctx.fillRect(x - 1, y, 2, dashH);
  }
  // Faint vertical glow line
  const gline = ctx.createLinearGradient(cx-20, 0, cx+20, 0);
  gline.addColorStop(0, 'transparent');
  gline.addColorStop(0.5, 'rgba(0,238,255,0.015)');
  gline.addColorStop(1, 'transparent');
  ctx.fillStyle = gline;
  ctx.fillRect(cx-20, 0, 40, H);
}

// Convert game coords (-1..1) to screen pixels
function gx(v) { return cx + v * cx * 0.88; }
function gy(v) { return cy + v * cy * 0.88; }
function gs(v) { return v * Math.min(W, H) * 0.88 * 0.5; }

function drawPaddleRect(px, py, isP1) {
  const color = isP1 ? '#00eeff' : '#ff4466';
  const glowColor = isP1 ? 'rgba(0,238,255,' : 'rgba(255,68,102,';
  const sw = gs(PADDLE_W * 2);
  const sh = gs(PADDLE_H * 2);
  const sx = gx(px) - sw / 2;
  const sy = gy(py) - sh / 2;
  const r  = sw * 0.35; // corner radius

  ctx.save();
  // Outer glow
  ctx.shadowColor = color;
  ctx.shadowBlur  = 28;

  // Gradient paddle
  const grad = ctx.createLinearGradient(sx, sy, sx + sw, sy + sh);
  grad.addColorStop(0, color);
  grad.addColorStop(0.5, isP1 ? 'rgba(0,238,255,0.7)' : 'rgba(255,68,102,0.7)');
  grad.addColorStop(1, color);

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(sx, sy, sw, sh, r);
  ctx.fill();

  // Inner highlight
  ctx.shadowBlur = 0;
  ctx.fillStyle = isP1 ? 'rgba(180,255,255,0.2)' : 'rgba(255,180,190,0.2)';
  ctx.beginPath();
  ctx.roundRect(sx + sw*0.15, sy + sh*0.05, sw*0.3, sh*0.9, r*0.5);
  ctx.fill();

  ctx.restore();
}

function drawBallRect(bx, by) {
  const r  = gs(BALL_R * 2);
  const sx = gx(bx);
  const sy = gy(by);
  ctx.save();
  // Outer glow
  ctx.shadowColor = '#fff';
  ctx.shadowBlur  = 32;
  // Ball
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(sx, sy, r * 0.5, 0, Math.PI * 2);
  ctx.fill();
  // Inner bright core
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(200,240,255,0.9)';
  ctx.beginPath();
  ctx.arc(sx - r*0.1, sy - r*0.1, r * 0.22, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= 0.04; p.vx *= 0.95;
    ctx.save();
    ctx.globalAlpha = p.life * 0.8;
    ctx.shadowColor = p.color; ctx.shadowBlur = 6; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function spawnParticles(bx, by, color) {
  const sx = gx(bx); const sy = gy(by);
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2, s = 1.5 + Math.random() * 3;
    particles.push({ x: sx, y: sy, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, color, r: 2+Math.random()*3 });
  }
}

// ══ RENDER LOOP ═══════════════════════════════════════════════════════════════
function renderLoop() {
  animFrame = requestAnimationFrame(renderLoop);
  drawBackground();
  drawCenterLine();

  const p0y = myIdx===0 ? myPaddleY  : oppPaddleY;
  const p1y = myIdx===0 ? oppPaddleY : myPaddleY;
  drawPaddleRect(-0.9, p0y, true);
  drawPaddleRect( 0.9, p1y, false);

  drawBallRect(ballState.x, ballState.y);
  updateParticles();
}

// ══ INPUT ═════════════════════════════════════════════════════════════════════
const keys = {};
let paddleMoveInterval = null;
const MOVE_SPEED = 0.032;

function movePaddle(dir) {
  myPaddleY = Math.max(-1+PADDLE_H, Math.min(1-PADDLE_H, myPaddleY + dir*MOVE_SPEED));
  if (roomId) socket.emit('move_paddle', { room_id: roomId, y: myPaddleY });
}

// Keyboard
document.addEventListener('keydown', e=>{
  if(keys[e.key]) return;
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e=>{ keys[e.key]=false; });

function keyboardLoop() {
  if(keys['ArrowUp']  ||keys['w']||keys['W']) movePaddle(-1);
  if(keys['ArrowDown']||keys['s']||keys['S']) movePaddle( 1);
  requestAnimationFrame(keyboardLoop);
}
requestAnimationFrame(keyboardLoop);

// Mobile buttons
const btnUp   = document.getElementById('btn-up');
const btnDown = document.getElementById('btn-down');

function setupMobileBtn(btn, dir) {
  let iv = null;
  const start = e => {
    e.preventDefault();
    btn.classList.add('pressed');
    movePaddle(dir);
    iv = setInterval(()=>movePaddle(dir), 16);
  };
  const stop = e => {
    btn.classList.remove('pressed');
    clearInterval(iv); iv=null;
  };
  btn.addEventListener('touchstart', start, {passive:false});
  btn.addEventListener('touchend',   stop,  {passive:false});
  btn.addEventListener('mousedown',  start);
  btn.addEventListener('mouseup',    stop);
  btn.addEventListener('mouseleave', stop);
}
setupMobileBtn(btnUp,   -1);
setupMobileBtn(btnDown,  1);

// ══ SOCKET.IO ═════════════════════════════════════════════════════════════════
const socket = io();

socket.on('waiting_for_opponent', ()=>{
  show('screen-waiting');
});

socket.on('match_found', data=>{
  myIdx  = data.player_idx;
  roomId = data.room_id;
  myPaddleY=0; oppPaddleY=0;
  ballState={x:0,y:0,vx:0,vy:0};
  scores=[0,0];
  particles=[];
  armY=0;

  document.getElementById('label0').textContent = myIdx===0 ? myName.toUpperCase() : data.opponent.toUpperCase();
  document.getElementById('label1').textContent = myIdx===1 ? myName.toUpperCase() : data.opponent.toUpperCase();
  document.getElementById('opponent-label').textContent =
    `VS  ${data.opponent.toUpperCase()}  ·  ${data.turma.toUpperCase()}`;

  document.querySelector('#s0 .score-val').textContent='0';
  document.querySelector('#s1 .score-val').textContent='0';

  hide('screen-menu'); hide('screen-waiting'); hide('screen-win'); hide('screen-disconnected');
  show('hud'); show('opponent-label'); show('mobile-controls');

  if(!animFrame) renderLoop();
});

socket.on('game_state', data=>{
  ballState = data.ball;
  if(myIdx===0){ oppPaddleY=data.paddle1; }
  else         { oppPaddleY=data.paddle0; }
  if(data.time_left !== undefined) {
    const t = data.time_left;
    const mins = Math.floor(t / 60);
    const secs = String(t % 60).padStart(2, '0');
    const timerEl = document.getElementById('game-timer');
    timerEl.textContent = `${mins}:${secs}`;
    if(t <= 30) timerEl.classList.add('urgent');
    else timerEl.classList.remove('urgent');
  }
});

socket.on('score_update', data=>{
  scores = data.scores;
  document.querySelector('#s0 .score-val').textContent = scores[0];
  document.querySelector('#s1 .score-val').textContent = scores[1];
  armSwing = 8;
});

socket.on('math_question', data=>{
  showMath(data);
});

socket.on('math_result', data=>{
  resolvemath(data);
});

socket.on('game_over', data=>{
  hide('hud'); hide('opponent-label'); hide('mobile-controls');
  showWin(data);
});

socket.on('opponent_left', ()=>{
  hide('hud'); hide('opponent-label'); hide('mobile-controls');
  hideMathOverlay();
  show('screen-disconnected');
});

// ══ MATH UI ═══════════════════════════════════════════════════════════════════
let mathTimerInterval = null;
let mathTimerSec      = 8;
let myTurnToAnswer    = false;

function showMath(data) {
  myTurnToAnswer = true; // agora TODOS respondem sempre
  document.getElementById('math-who').innerHTML =
    `<span style="color:var(--gold)">⚡ SUA CONTA — RESPONDE!</span>`;
  document.getElementById('math-q').textContent = data.question;
  document.getElementById('math-fb').textContent = '';

  const btnsDiv = document.getElementById('math-btns');
  btnsDiv.innerHTML = '';
  data.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'math-btn';
    btn.textContent = c;
    btn.onclick = ()=>answerMath(i);
    btnsDiv.appendChild(btn);
  });

  mathTimerSec = 5;
  document.getElementById('math-timer-bar').style.width='100%';
  clearInterval(mathTimerInterval);
  mathTimerInterval = setInterval(()=>{
    mathTimerSec -= .1;
    document.getElementById('math-timer-bar').style.width = Math.max(0,(mathTimerSec/5)*100)+'%';
    if(mathTimerSec<=0) clearInterval(mathTimerInterval);
  },100);

  document.getElementById('math-overlay').classList.add('show');
}

function answerMath(idx) {
  if(!myTurnToAnswer) return;
  myTurnToAnswer = false;
  clearInterval(mathTimerInterval);
  socket.emit('answer_math', { room_id: roomId, idx });
  document.querySelectorAll('.math-btn').forEach(b=>b.onclick=null);
}

function resolvemath(data) {
  clearInterval(mathTimerInterval);
  const fb   = document.getElementById('math-fb');
  const btns = document.querySelectorAll('.math-btn');
  btns.forEach((b,i)=>{ if(i===data.correct_idx) b.classList.add('correct'); else b.classList.add('wrong'); b.onclick=null; });
  if(data.feedback==='correct')       { fb.style.color='#00ff80'; fb.textContent='✓ CORRETO! Bola mais lenta!'; }
  else if(data.feedback==='wrong')    { fb.style.color='#ff4466'; fb.textContent='✗ ERRADO! Bola mais rápida!'; }
  else                                { fb.style.color='#ffcc00'; fb.textContent='⏱ TEMPO ESGOTADO! Penalidade!'; }
  setTimeout(hideMathOverlay, 1300);
}

function hideMathOverlay() {
  clearInterval(mathTimerInterval);
  document.getElementById('math-overlay').classList.remove('show');
}

// ══ WIN / PÓDIO ═══════════════════════════════════════════════════════════════
function showWin(data) {
  const wn = document.getElementById('win-name');
  wn.textContent = data.winner_name.toUpperCase();
  wn.className   = `p${data.winner_idx}`;
  document.getElementById('win-turma').textContent = data.winner_turma.toUpperCase();

  buildPodium(data.leaderboard || []);
  show('screen-win');
}

function buildPodium(lb) {
  const podium = document.getElementById('podium');
  podium.innerHTML = '';
  const rest = document.getElementById('leaderboard-rest');
  rest.innerHTML = '';

  const top3 = lb.slice(0,3);
  const order = [1,0,2]; // visual order: 2nd, 1st, 3rd
  const rankClass = ['rank1','rank2','rank3'];
  const crowns = ['👑','','🥉'];

  order.forEach(i => {
    if(!top3[i]) return;
    const p = top3[i];
    const col = document.createElement('div');
    col.className='podium-col';
    col.innerHTML=`
      <div class="podium-rank">#${i+1}</div>
      <div class="podium-bar ${rankClass[i]}">
        ${i===0?'<div class="podium-crown">👑</div>':''}
        <div class="podium-wins">${p.wins}</div>
        <div class="podium-name">${p.name.toUpperCase()}<br><span style="color:#444;font-size:9px">${p.turma}</span></div>
      </div>`;
    podium.appendChild(col);
  });

  lb.slice(3).forEach((p, i) => {
    rest.innerHTML += `#${i+4} &nbsp; ${p.name.toUpperCase()} &nbsp; <span style="color:#555">${p.turma}</span> &nbsp; ${p.wins} vit<br>`;
  });
}

// ══ QUEUE ═════════════════════════════════════════════════════════════════════
function joinQueue() {
  const name  = document.getElementById('inp-name').value.trim();
  const turma = document.getElementById('inp-turma').value.trim();
  if(!name||!turma) {
    document.getElementById('inp-name').focus();
    return;
  }
  myName = name;
  socket.emit('join_queue', { name, turma });
  show('screen-waiting');
  hide('screen-menu');
}

function cancelQueue() {
  socket.disconnect();
  socket.connect();
  goMenu();
}

function goMenu() {
  hide('screen-win'); hide('screen-disconnected');
  hide('hud'); hide('opponent-label'); hide('mobile-controls');
  hideMathOverlay();
  if(animFrame){ cancelAnimationFrame(animFrame); animFrame=null; }
  roomId=null; myIdx=-1;
  show('screen-menu');
}

// ══ UTILS ═════════════════════════════════════════════════════════════════════
function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }

// Enter to confirm menu
document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !document.getElementById('screen-menu').classList.contains('hidden')) joinQueue();
});
</script>
