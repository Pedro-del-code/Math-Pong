<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000408">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MATH PONG</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --cyan:   #00eeff;
  --red:    #ff4466;
  --gold:   #ffcc00;
  --green:  #00ff88;
  --pink:   #ff44cc;
  --purple: #8844ff;
  --bg:     #000408;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Orbitron', monospace;
  display: flex;
  align-items: center;
  justify-content: center;
  image-rendering: pixelated;
}

/* ── SCANLINES ── */
#scanlines {
  position: fixed; inset: 0; z-index: 999; pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 2px,
    rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
  );
}

/* ── STARS BG ── */
#stars {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  overflow: hidden;
}
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite;
}
@keyframes twinkle {
  0%,100%{ opacity:0.2; } 50%{ opacity:1; }
}

/* ── CITY SILHOUETTE BG ── */
#city-bg {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  display: flex; align-items: flex-end; justify-content: center;
  padding: 0 10px;
  opacity: 0.25;
}

/* ── MAIN WRAPPER ── */
#arcade-wrap {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  width: min(420px, 96vw);
  animation: fadeInScale 0.8s ease-out forwards;
}
@keyframes fadeInScale {
  from { opacity:0; transform: scale(0.92); }
  to   { opacity:1; transform: scale(1); }
}

/* ── ARCADE CABINET ── */
#cabinet {
  width: 100%;
  position: relative;
  display: flex; flex-direction: column;
  align-items: center;
  filter: drop-shadow(0 0 40px rgba(0,238,255,0.25)) drop-shadow(0 0 80px rgba(136,68,255,0.2));
}

/* TOP MARQUEE FRAME */
#marquee-frame {
  width: 88%;
  background: linear-gradient(135deg, #1a0033, #2a0055, #1a0033);
  border: 3px solid var(--pink);
  border-bottom: none;
  border-radius: 12px 12px 0 0;
  padding: 10px 16px 8px;
  text-align: center;
  box-shadow:
    0 0 20px rgba(255,68,204,0.6),
    inset 0 0 20px rgba(136,68,255,0.3);
  position: relative;
  z-index: 2;
}

#game-title {
  font-size: clamp(28px, 9vw, 44px);
  font-weight: 900;
  letter-spacing: 6px;
  color: var(--cyan);
  text-shadow:
    0 0 10px var(--cyan),
    0 0 30px rgba(0,238,255,0.5),
    2px 2px 0 rgba(0,0,0,0.8);
  line-height: 1;
  animation: titleGlow 2s ease-in-out infinite;
}
@keyframes titleGlow {
  0%,100%{ text-shadow: 0 0 10px var(--cyan), 0 0 30px rgba(0,238,255,0.5), 2px 2px 0 rgba(0,0,0,0.8); }
  50%    { text-shadow: 0 0 20px var(--cyan), 0 0 60px rgba(0,238,255,0.8), 2px 2px 0 rgba(0,0,0,0.8); }
}

#subtitle-badge {
  display: inline-block;
  margin-top: 4px;
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(9px, 2.5vw, 12px);
  letter-spacing: 4px;
  color: var(--gold);
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,204,0,0.4);
  padding: 3px 10px;
  border-radius: 3px;
  text-shadow: 0 0 8px rgba(255,204,0,0.8);
}

/* CABINET BODY */
#cabinet-body {
  width: 94%;
  background: linear-gradient(180deg, #0d0020 0%, #0a001a 100%);
  border: 3px solid var(--purple);
  border-top: none;
  border-bottom: none;
  padding: 0 16px;
  position: relative;
  box-shadow:
    -8px 0 20px rgba(136,68,255,0.2),
    8px 0 20px rgba(136,68,255,0.2);
}

/* SCREEN AREA */
#screen-area {
  width: 100%;
  background: #050010;
  border: 3px solid rgba(0,238,255,0.4);
  border-radius: 4px;
  margin: 12px 0;
  padding: 0;
  position: relative;
  overflow: hidden;
  aspect-ratio: 4/3;
  box-shadow:
    inset 0 0 30px rgba(0,0,0,0.8),
    0 0 15px rgba(0,238,255,0.2);
}

/* CRT inner glow */
#screen-area::before {
  content:'';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(0,10,30,0) 40%, rgba(0,0,0,0.7) 100%);
  pointer-events: none; z-index: 5;
}

/* Screen content */
#screen-content {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
  padding: 16px;
}

/* Mini pong preview */
#pong-preview {
  width: 80%; height: 40%;
  position: relative;
  border: 1px solid rgba(0,238,255,0.15);
}
.pong-paddle {
  position: absolute;
  width: 6px; height: 25%;
  background: var(--cyan);
  border-radius: 2px;
  box-shadow: 0 0 8px var(--cyan);
  top: 50%; transform: translateY(-50%);
}
#p-left  { left: 4px; }
#p-right { right: 4px; }
#pong-ball {
  position: absolute;
  width: 10px; height: 10px;
  background: var(--gold);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--gold);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: ballBounce 2.2s ease-in-out infinite;
}
.pong-center-line {
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  width: 1px;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 8px,
    transparent 8px, transparent 16px
  );
}
@keyframes ballBounce {
  0%   { top:30%; left:20%; }
  25%  { top:70%; left:80%; }
  50%  { top:20%; left:60%; }
  75%  { top:60%; left:30%; }
  100% { top:30%; left:20%; }
}

/* Insert coin / coming soon text */
#screen-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(10px, 2.8vw, 14px);
  letter-spacing: 3px;
  color: #fff;
  text-shadow: 0 0 8px rgba(255,255,255,0.5);
  animation: blink 1s step-start infinite;
}
@keyframes blink {
  0%,100%{ opacity:1; } 50%{ opacity:0; }
}

#score-preview {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(18px, 5vw, 26px);
  letter-spacing: 8px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,255,255,0.4);
}

/* PIXEL DECORATION STRIPS */
.pixel-strip {
  width: 100%; height: 8px;
  display: flex;
}
.px { flex: 1; height: 100%; }

/* CONTROLS AREA */
#controls-area {
  padding: 10px 16px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

/* Joystick */
.joystick {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  flex-shrink: 0;
}
.joystick-base {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, #2a2a3a, #1a1a28);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.joystick-stick {
  width: 8px; height: 26px;
  background: linear-gradient(180deg, #cc44ff, #8822cc);
  border-radius: 4px;
  box-shadow: 0 0 8px rgba(200,68,255,0.6);
  position: relative;
}
.joystick-ball {
  width: 18px; height: 18px;
  background: radial-gradient(circle at 35% 35%, #ff88ff, #cc44ff);
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(255,68,255,0.7);
  position: absolute;
  top: -10px; left: 50%;
  transform: translateX(-50%);
}

.btn-row {
  display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
}
.arcade-btn {
  width: clamp(22px, 6vw, 30px);
  height: clamp(22px, 6vw, 30px);
  border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.3);
  box-shadow: 0 3px 0 rgba(0,0,0,0.4), 0 0 8px currentColor;
}
.btn-c { background: var(--cyan);   color: var(--cyan); }
.btn-p { background: var(--pink);   color: var(--pink); }
.btn-g { background: var(--green);  color: var(--green); }
.btn-r { background: var(--red);    color: var(--red); }
.btn-gold { background: var(--gold); color: var(--gold); }

/* PLAY BUTTON */
#play-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer;
  transition: transform 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
#play-btn:active { transform: scale(0.93); }

#play-btn-inner {
  background: linear-gradient(135deg, #00cc44, #008833);
  border: 3px solid #00ff66;
  border-radius: 8px;
  padding: clamp(10px,3vw,14px) clamp(18px,5vw,26px);
  font-size: clamp(11px,3.5vw,15px);
  font-weight: 900;
  letter-spacing: 4px;
  color: #fff;
  text-shadow: 0 0 10px rgba(0,255,102,0.8);
  box-shadow:
    0 4px 0 #004422,
    0 0 20px rgba(0,255,102,0.4);
  animation: playPulse 1.5s ease-in-out infinite;
  display: flex; align-items: center; gap: 8px;
}
@keyframes playPulse {
  0%,100%{ box-shadow: 0 4px 0 #004422, 0 0 20px rgba(0,255,102,0.4); }
  50%    { box-shadow: 0 4px 0 #004422, 0 0 35px rgba(0,255,102,0.7), 0 0 60px rgba(0,255,102,0.2); }
}
#play-btn-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(7px,2vw,9px);
  letter-spacing: 3px;
  color: rgba(0,255,102,0.6);
}

/* CABINET BOTTOM */
#cabinet-bottom {
  width: 88%;
  background: linear-gradient(135deg, #0d0020, #1a0033);
  border: 3px solid var(--purple);
  border-top: 3px solid rgba(136,68,255,0.3);
  border-radius: 0 0 16px 16px;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#maker-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(7px,2vw,9px);
  letter-spacing: 3px;
  color: rgba(136,68,255,0.5);
}
#coin-slot {
  width: 30px; height: 12px;
  background: #111;
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
.coin-line {
  width: 16px; height: 3px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
}

/* ── TRANSITION FLASH ── */
#flash {
  position: fixed; inset: 0; z-index: 9999;
  background: #fff;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease;
}
#flash.go { opacity: 1; }

/* ── PIXEL CREDIT ── */
#credit-display {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(7px, 2vw, 9px);
  letter-spacing: 3px;
  color: rgba(0,238,255,0.35);
  margin-top: 10px;
  text-align: center;
  animation: creditBlink 3s step-start infinite;
}
@keyframes creditBlink {
  0%,90%,100%{ opacity:0.35; } 92%{ opacity:0; } 94%{ opacity:0.35; } 96%{ opacity:0; } 98%{ opacity:0.35; }
}
</style>
</head>
<body>

<div id="scanlines"></div>
<div id="flash"></div>

<!-- STARS -->
<div id="stars"></div>

<!-- ARCADE CABINET -->
<div id="arcade-wrap">
  <div id="cabinet">

    <!-- MARQUEE -->
    <div id="marquee-frame">
      <div id="game-title">MATH PONG</div>
      <div id="subtitle-badge">⚡ DESAFIO MATEMÁTICO ⚡</div>
    </div>

    <!-- BODY -->
    <div id="cabinet-body">

      <!-- pixel strip top -->
      <div class="pixel-strip" id="pstrip-top"></div>

      <!-- SCREEN -->
      <div id="screen-area">
        <div id="screen-content">
          <div id="score-preview">03 &nbsp; 05</div>

          <div id="pong-preview">
            <div class="pong-center-line"></div>
            <div class="pong-paddle" id="p-left"></div>
            <div class="pong-paddle" id="p-right"></div>
            <div id="pong-ball"></div>
          </div>

          <div id="screen-text">▶ TOQUE PARA JOGAR ◀</div>
        </div>
      </div>

      <!-- pixel strip bottom -->
      <div class="pixel-strip" id="pstrip-bot"></div>

      <!-- CONTROLS -->
      <div id="controls-area">
        <!-- left joystick -->
        <div class="joystick">
          <div class="joystick-base">
            <div class="joystick-stick">
              <div class="joystick-ball"></div>
            </div>
          </div>
          <div class="btn-row" style="margin-top:4px;">
            <div class="arcade-btn btn-c"></div>
            <div class="arcade-btn btn-p"></div>
          </div>
          <div class="btn-row">
            <div class="arcade-btn btn-g"></div>
          </div>
        </div>

        <!-- PLAY button center -->
        <div id="play-btn" onclick="goPlay()">
          <div id="play-btn-inner">
            ▶ &nbsp; JOGAR
          </div>
          <div id="play-btn-label">PRESSIONE PLAY</div>
        </div>

        <!-- right joystick -->
        <div class="joystick">
          <div class="joystick-base">
            <div class="joystick-stick">
              <div class="joystick-ball"></div>
            </div>
          </div>
          <div class="btn-row" style="margin-top:4px;">
            <div class="arcade-btn btn-r"></div>
            <div class="arcade-btn btn-gold"></div>
          </div>
          <div class="btn-row">
            <div class="arcade-btn btn-p"></div>
          </div>
        </div>
      </div>

    </div><!-- /cabinet-body -->

    <!-- BOTTOM -->
    <div id="cabinet-bottom">
      <div id="maker-tag">© MATH PONG 2025</div>
      <div id="coin-slot"><div class="coin-line"></div></div>
      <div id="maker-tag">v1.0</div>
    </div>

  </div><!-- /cabinet -->

  <div id="credit-display">INSERT COIN &nbsp; — &nbsp; CRÉDITO: 1</div>
</div>

<script>
// ── STARS ──
(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${sz}px; height:${sz}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --dur:${(Math.random()*3+1.5).toFixed(2)}s;
      animation-delay:${(Math.random()*4).toFixed(2)}s;
      opacity:${Math.random()*0.5+0.1};
    `;
    c.appendChild(s);
  }
})();

// ── PIXEL STRIPS (coloured pixels like arcade art) ──
function makeStrip(id) {
  const strip = document.getElementById(id);
  const colors = ['#00eeff','#ff44cc','#8844ff','#00ff88','#ffcc00','#ff4466','#00eeff','#8844ff'];
  for (let i = 0; i < 40; i++) {
    const px = document.createElement('div');
    px.className = 'px';
    px.style.background = colors[i % colors.length];
    px.style.opacity = (Math.random() * 0.5 + 0.3).toFixed(2);
    strip.appendChild(px);
  }
}
makeStrip('pstrip-top');
makeStrip('pstrip-bot');

// ── ANIMATED LEFT PADDLE ──
(function() {
  const lp = document.getElementById('p-left');
  let y = 37.5, dir = 1, speed = 0.4;
  function tick() {
    y += dir * speed;
    if (y > 60) dir = -1;
    if (y < 15) dir = 1;
    lp.style.top = y + '%';
    requestAnimationFrame(tick);
  }
  tick();
})();

// ── SCREEN TEXT CYCLING ──
const msgs = [
  '▶ TOQUE PARA JOGAR ◀',
  'DESAFIO MATEMÁTICO',
  '2 JOGADORES ONLINE',
  '▶ PRESS PLAY ◀'
];
let mi = 0;
setInterval(() => {
  mi = (mi + 1) % msgs.length;
  const el = document.getElementById('screen-text');
  el.style.opacity = '0';
  setTimeout(() => {
    el.textContent = msgs[mi];
    el.style.opacity = '1';
    el.style.transition = 'opacity 0.3s';
  }, 300);
}, 2500);

// ── GO PLAY ──
function goPlay() {
  const flash = document.getElementById('flash');
  flash.classList.add('go');
  // Som de clique (Web Audio API)
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(220, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.start();
    osc.stop(ctx.currentTime + 0.2);
  } catch(e) {}

  setTimeout(() => {
    window.location.href = '/menu';
  }, 300);
}

// Também funciona com qualquer toque na tela
document.body.addEventListener('keydown', (e) => {
  if (e.code === 'Enter' || e.code === 'Space') goPlay();
});
</script>

</body>
</html>
